<svg viewBox="0 0 1400 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Définitions -->
  <defs>
    <!-- Gradient pour le fond -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ombre portée -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fond -->
  <rect width="1400" height="1100" fill="url(#bgGradient)"/>
  
  <!-- Bordure du système -->
  <rect x="200" y="50" width="1000" height="1000" 
        fill="white" stroke="#2c3e50" stroke-width="2.5" 
        rx="10" filter="url(#shadow)"/>
  
  <!-- Titre du système -->
  <text x="700" y="90" font-family="Arial, sans-serif" font-size="24" 
        font-weight="bold" fill="#2c3e50" text-anchor="middle">
    Bibliothèque de Prompts
  </text>
  
  <line x1="250" y1="105" x2="1150" y2="105" stroke="#3498db" stroke-width="2"/>
  
  <!-- Acteur Utilisateur -->
  <g id="utilisateur">
    <!-- Tête -->
    <circle cx="100" cy="350" r="25" fill="none" stroke="#2c3e50" stroke-width="2.5"/>
    <!-- Corps -->
    <line x1="100" y1="375" x2="100" y2="430" stroke="#2c3e50" stroke-width="2.5"/>
    <!-- Bras -->
    <line x1="100" y1="395" x2="70" y2="415" stroke="#2c3e50" stroke-width="2.5"/>
    <line x1="100" y1="395" x2="130" y2="415" stroke="#2c3e50" stroke-width="2.5"/>
    <!-- Jambes -->
    <line x1="100" y1="430" x2="80" y2="470" stroke="#2c3e50" stroke-width="2.5"/>
    <line x1="100" y1="430" x2="120" y2="470" stroke="#2c3e50" stroke-width="2.5"/>
    <!-- Label -->
    <text x="100" y="500" font-family="Arial, sans-serif" font-size="16" 
          font-weight="bold" fill="#2c3e50" text-anchor="middle">
      Utilisateur
    </text>
  </g>
  
  <!-- Acteur Administrateur -->
  <g id="administrateur">
    <!-- Tête -->
    <circle cx="100" cy="750" r="25" fill="none" stroke="#d68910" stroke-width="2.5"/>
    <!-- Corps -->
    <line x1="100" y1="775" x2="100" y2="830" stroke="#d68910" stroke-width="2.5"/>
    <!-- Bras -->
    <line x1="100" y1="795" x2="70" y2="815" stroke="#d68910" stroke-width="2.5"/>
    <line x1="100" y1="795" x2="130" y2="815" stroke="#d68910" stroke-width="2.5"/>
    <!-- Jambes -->
    <line x1="100" y1="830" x2="80" y2="870" stroke="#d68910" stroke-width="2.5"/>
    <line x1="100" y1="830" x2="120" y2="870" stroke="#d68910" stroke-width="2.5"/>
    <!-- Label -->
    <text x="100" y="900" font-family="Arial, sans-serif" font-size="16" 
          font-weight="bold" fill="#d68910" text-anchor="middle">
      Administrateur
    </text>
  </g>
  
  <!-- Section: Consultation et Navigation -->
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="14" 
        font-style="italic" fill="#7f8c8d" text-anchor="middle">
    « Consultation et Navigation »
  </text>
  
  <!-- UC1: Consulter la bibliothèque -->
  <ellipse cx="550" cy="180" rx="120" ry="35" 
           fill="#e8f4f8" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="185" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Consulter la
  </text>
  <text x="550" y="202" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    bibliothèque de prompts
  </text>
  
  <!-- UC2: Filtrer les prompts -->
  <ellipse cx="800" cy="180" rx="100" ry="35" 
           fill="#e8f4f8" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="185" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Filtrer les prompts
  </text>
  
  <!-- UC5: Consulter le détail -->
  <ellipse cx="1000" cy="180" rx="110" ry="35" 
           fill="#e8f4f8" stroke="#3498db" stroke-width="2" filter="url(#shadow)"/>
  <text x="1000" y="185" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Consulter le détail
  </text>
  <text x="1000" y="202" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    d'un prompt
  </text>
  
  <!-- Section: Évaluation -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="14" 
        font-style="italic" fill="#7f8c8d" text-anchor="middle">
    « Évaluation »
  </text>
  
  <!-- UC3: Évaluer positivement -->
  <ellipse cx="400" cy="330" rx="105" ry="35" 
           fill="#d5f4e6" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="335" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Évaluer positivement
  </text>
  <text x="400" y="352" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    un prompt
  </text>
  
  <!-- UC4: Évaluer négativement -->
  <ellipse cx="650" cy="330" rx="105" ry="35" 
           fill="#fadbd8" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="335" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Évaluer négativement
  </text>
  <text x="650" y="352" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    un prompt
  </text>
  
  <!-- Section: Gestion des Prompts -->
  <text x="700" y="440" font-family="Arial, sans-serif" font-size="14" 
        font-style="italic" fill="#7f8c8d" text-anchor="middle">
    « Gestion des Prompts »
  </text>
  
  <!-- UC8: Créer un prompt -->
  <ellipse cx="450" cy="490" rx="100" ry="35" 
           fill="#fff9e6" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="495" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Créer un nouveau
  </text>
  <text x="450" y="512" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    prompt
  </text>
  
  <!-- UC6: Modifier un prompt -->
  <ellipse cx="700" cy="490" rx="95" ry="35" 
           fill="#fff9e6" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="495" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Modifier un prompt
  </text>
  
  <!-- UC7: Supprimer un prompt -->
  <ellipse cx="920" cy="490" rx="95" ry="35" 
           fill="#fff9e6" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="920" y="495" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Supprimer un prompt
  </text>
  
  <!-- Section: Administration -->
  <rect x="350" y="580" width="750" height="420" 
        fill="#fef5e7" stroke="#d68910" stroke-width="2" 
        stroke-dasharray="5,5" rx="8" filter="url(#shadow)"/>
  
  <text x="725" y="615" font-family="Arial, sans-serif" font-size="16" 
        font-weight="bold" fill="#d68910" text-anchor="middle">
    « Administration »
  </text>
  
  <!-- UC9: Gérer les catégories -->
  <ellipse cx="500" cy="700" rx="95" ry="40" 
           fill="#ebf5fb" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="695" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Gérer les
  </text>
  <text x="500" y="712" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    catégories
  </text>
  
  <!-- UC10: Gérer les sous-catégories -->
  <ellipse cx="725" cy="700" rx="95" ry="40" 
           fill="#ebf5fb" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="725" y="695" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Gérer les
  </text>
  <text x="725" y="712" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    sous-catégories
  </text>
  
  <!-- UC11: Gérer les frameworks -->
  <ellipse cx="950" cy="700" rx="95" ry="40" 
           fill="#ebf5fb" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="950" y="695" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    Gérer les
  </text>
  <text x="950" y="712" font-family="Arial, sans-serif" font-size="13" 
        fill="#2c3e50" text-anchor="middle">
    frameworks
  </text>
  
  <!-- CRUD Operations pour Catégories -->
  <g opacity="0.7">
    <ellipse cx="420" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="420" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Créer</text>
    
    <ellipse cx="500" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="500" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Consulter</text>
    
    <ellipse cx="420" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="420" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Modifier</text>
    
    <ellipse cx="500" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="500" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Supprimer</text>
  </g>
  
  <!-- CRUD Operations pour Sous-catégories -->
  <g opacity="0.7">
    <ellipse cx="645" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="645" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Créer</text>
    
    <ellipse cx="725" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="725" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Consulter</text>
    
    <ellipse cx="645" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="645" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Modifier</text>
    
    <ellipse cx="725" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="725" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Supprimer</text>
  </g>
  
  <!-- CRUD Operations pour Frameworks -->
  <g opacity="0.7">
    <ellipse cx="870" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="870" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Créer</text>
    
    <ellipse cx="950" cy="820" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="950" y="825" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Consulter</text>
    
    <ellipse cx="870" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="870" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Modifier</text>
    
    <ellipse cx="950" cy="870" rx="60" ry="25" fill="#d6eaf8" stroke="#5499c7" stroke-width="1.5"/>
    <text x="950" y="875" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">Supprimer</text>
  </g>
  
  <!-- Relations: Utilisateur vers UC non-administratifs -->
  <!-- Consultation -->
  <line x1="130" y1="350" x2="430" y2="180" stroke="#34495e" stroke-width="1.5"/>
  <line x1="130" y1="350" x2="700" y2="180" stroke="#34495e" stroke-width="1.5"/>
  <line x1="130" y1="350" x2="890" y2="180" stroke="#34495e" stroke-width="1.5"/>
  
  <!-- Évaluation -->
  <line x1="130" y1="360" x2="310" y2="330" stroke="#34495e" stroke-width="1.5"/>
  <line x1="130" y1="360" x2="545" y2="330" stroke="#34495e" stroke-width="1.5"/>
  
  <!-- Gestion -->
  <line x1="130" y1="370" x2="350" y2="490" stroke="#34495e" stroke-width="1.5"/>
  <line x1="130" y1="380" x2="600" y2="490" stroke="#34495e" stroke-width="1.5"/>
  <line x1="130" y1="390" x2="825" y2="490" stroke="#34495e" stroke-width="1.5"/>
  
  <!-- Relations: Administrateur vers UC d'administration uniquement -->
  <line x1="130" y1="750" x2="405" y2="700" stroke="#d68910" stroke-width="2"/>
  <line x1="130" y1="750" x2="630" y2="700" stroke="#d68910" stroke-width="2"/>
  <line x1="130" y1="750" x2="855" y2="700" stroke="#d68910" stroke-width="2"/>
  
  <!-- Relations include pour CRUD -->
  <line x1="500" y1="740" x2="460" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="475" y="765" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">«include»</text>
  
  <line x1="500" y1="740" x2="500" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="505" y="765" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">«include»</text>
  
  <line x1="480" y1="740" x2="440" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="455" y="790" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">«include»</text>
  
  <line x1="510" y1="740" x2="510" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="515" y="790" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">«include»</text>
  
  <!-- Sous-catégories CRUD -->
  <line x1="725" y1="740" x2="685" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="725" y1="740" x2="725" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="705" y1="740" x2="665" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="735" y1="740" x2="735" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Frameworks CRUD -->
  <line x1="950" y1="740" x2="910" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="950" y1="740" x2="950" y2="795" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="930" y1="740" x2="890" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="960" y1="740" x2="960" y2="845" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Légende -->
  <g transform="translate(250, 950)">
    <rect x="0" y="0" width="900" height="80" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Légende :</text>
    
    <circle cx="20" cy="40" r="12" fill="none" stroke="#2c3e50" stroke-width="2"/>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Utilisateur</text>
    
    <circle cx="130" cy="40" r="12" fill="none" stroke="#d68910" stroke-width="2"/>
    <text x="150" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Administrateur</text>
    
    <ellipse cx="300" cy="40" rx="40" ry="15" fill="#e8f4f8" stroke="#3498db" stroke-width="1.5"/>
    <text x="350" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">UC Consultation</text>
    
    <ellipse cx="500" cy="40" rx="40" ry="15" fill="#d5f4e6" stroke="#27ae60" stroke-width="1.5"/>
    <text x="550" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">UC Évaluation</text>
    
    <ellipse cx="700" cy="40" rx="40" ry="15" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
    <text x="750" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">UC Gestion</text>
    
    <line x1="10" y1="65" x2="50" y2="65" stroke="#34495e" stroke-width="1.5"/>
    <text x="60" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Association</text>
    
    <line x1="170" y1="65" x2="210" y2="65" stroke="#95a5a6" stroke-width="1.5" stroke-dasharray="5,5"/>
    <text x="220" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">«include»</text>
    
    <rect x="320" y="55" width="80" height="20" fill="#fef5e7" stroke="#d68910" stroke-width="1" stroke-dasharray="3,3" rx="3"/>
    <text x="410" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Paquetage (Administration)</text>
  </g>
  
</svg>